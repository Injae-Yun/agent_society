  - {id: miner_2, name: "Miner Tara",    role: miner, home_node: farm, gold: 20}
  - {id: miner_3, name: "Miner Uma",     role: miner, home_node: farm, gold: 20, inventory: {ore: 2}}
  - {id: miner_4, name: "Miner Vic",     role: miner, home_node: farm, gold: 20}
  - {id: miner_5, name: "Miner Wren",    role: miner, home_node: farm, gold: 20, inventory: {ore: 1}}

