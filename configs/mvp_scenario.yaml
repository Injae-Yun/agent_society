seed: 42

nodes:
  # City
  - id: city.market
    name: City Market
    region: city
    affordances: [trade]
    stockpile: {wheat: 30, meat: 15}

  - id: city.smithy
    name: Smithy
    region: city
    affordances: [craft_weapons, craft_tools]
    stockpile: {ore: 24}

  - id: city.kitchen
    name: Kitchen
    region: city
    affordances: [cook]
    stockpile: {wheat: 15, meat: 9, cooking_tools: 3}

  - id: city.residential
    name: Residential
    region: city
    affordances: [rest]
    stockpile: {wheat: 15}

  # Farmland
  - id: farm.grain_field
    name: Grain Field
    region: farmland
    affordances: [produce_wheat]
    stockpile: {wheat: 60, plow: 6, sickle: 6}

  - id: farm.pasture
    name: Pasture
    region: farmland
    affordances: [produce_meat]
    stockpile: {meat: 45, sickle: 6}

  - id: farm.orchard
    name: Orchard
    region: farmland
    affordances: [produce_fruit]
    stockpile: {fruit: 30, pruning_shears: 3}

  - id: farm.mine
    name: Mine
    region: farmland
    affordances: [produce_ore]
    stockpile: {ore: 36, pickaxe: 6}

  - id: farm.hub
    name: Farmland Hub
    region: farmland
    affordances: [trade]
    stockpile: {wheat: 15, meat: 15}

  # Raider base
  - id: raider.hideout
    name: Raider Hideout
    region: raider_base
    affordances: [raider_spawn]
    stockpile: {meat: 3}

  # Route waypoints
  - id: route.safe_mid
    name: Safe Route Midpoint
    region: city

  - id: route.risky_mid
    name: Risky Route Midpoint
    region: raider_base

edges:
  # Safe route — 10 tick total (5+5), 1% per-tick ambush chance
  - u: city.market
    v: route.safe_mid
    travel_cost: 5
    base_threat: 0.10
    capacity: 4

  - u: route.safe_mid
    v: farm.hub
    travel_cost: 5
    base_threat: 0.10
    capacity: 4

  # Risky route — 4 tick total (2+2), 15% per-tick ambush chance
  - u: city.market
    v: route.risky_mid
    travel_cost: 2
    base_threat: 0.70
    capacity: 4

  - u: route.risky_mid
    v: farm.hub
    travel_cost: 2
    base_threat: 0.70
    capacity: 4

  # Raider base connection
  - u: route.risky_mid
    v: raider.hideout
    travel_cost: 1
    base_threat: 0.0
    capacity: 1

  # City internal edges
  - u: city.market
    v: city.smithy
    travel_cost: 1
    capacity: 20

  - u: city.market
    v: city.kitchen
    travel_cost: 1
    capacity: 20

  - u: city.market
    v: city.residential
    travel_cost: 1
    capacity: 20

  # Farmland internal edges
  - u: farm.hub
    v: farm.grain_field
    travel_cost: 2
    capacity: 20

  - u: farm.hub
    v: farm.pasture
    travel_cost: 2
    capacity: 20

  - u: farm.hub
    v: farm.orchard
    travel_cost: 2
    capacity: 20

  - u: farm.hub
    v: farm.mine
    travel_cost: 2
    capacity: 20

