  # ── Raider (1) ────────────────────────────────────────────────────────────────
  - id: raiders
    name: Raider Band
    role: raider
    home_node: raider.hideout
    strength: 60.0
    inventory: {meat: 2}

  # ── Adventurers (2) — NPC quest takers, help stabilise raider strength &
  #    deliver goods where the QuestGenerator flags shortages. ──────────────────
  - id: adventurer_1
    name: "Adventurer Ryn"
    role: adventurer
    home_node: city
    gold: 100
    skill: 55
    combat_power: 25
    equipped_weapon: {type: sword, tier: basic, durability: 45, max_durability: 50}

  - id: adventurer_2
    name: "Adventurer Saga"
    role: adventurer
    home_node: city
    gold: 100
    skill: 50
    combat_power: 20
    equipped_weapon: {type: sword, tier: basic, durability: 40, max_durability: 50}

  # ── Player (1) — the one controlled from the outside; idle if no interface
  #    is attached (default). Only eligible agent for `heroic`-tier quests. ──
