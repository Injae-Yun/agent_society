seed: 42

nodes:
  # ── City/Farm stockpile은 builder가 economy/equilibrium에서 자동 생성.
  #    수동 override 필요 시 `stockpile: {good: qty}` 지정 가능. ─────────────────
  - id: city
    name: City
    region: city
    affordances: [trade, craft_weapons, craft_tools, cook, rest]

  - id: farm
    name: Farmland
    region: farmland
    affordances: [trade, produce_wheat, produce_meat, produce_fruit, produce_ore]

  - id: raider.hideout
    name: Raider Hideout
    region: raider_base
    affordances: [raider_spawn]
    stockpile: {meat: 3}

  # ── Risky route tiles (상단, 4 타일) ────────────────────────────────────────
  - {id: route.risky.1, name: "Risky Route Tile 1", region: raider_base}
  - {id: route.risky.2, name: "Risky Route Tile 2", region: raider_base}
  - {id: route.risky.3, name: "Risky Route Tile 3", region: raider_base}
  - {id: route.risky.4, name: "Risky Route Tile 4", region: raider_base}

  # ── Safe route tiles (하단 U자, 10 타일) ────────────────────────────────────
  - {id: route.safe.1,  name: "Safe Route Tile 1",  region: route}
  - {id: route.safe.2,  name: "Safe Route Tile 2",  region: route}
  - {id: route.safe.3,  name: "Safe Route Tile 3",  region: route}
  - {id: route.safe.4,  name: "Safe Route Tile 4",  region: route}
  - {id: route.safe.5,  name: "Safe Route Tile 5",  region: route}
  - {id: route.safe.6,  name: "Safe Route Tile 6",  region: route}
  - {id: route.safe.7,  name: "Safe Route Tile 7",  region: route}
  - {id: route.safe.8,  name: "Safe Route Tile 8",  region: route}
  - {id: route.safe.9,  name: "Safe Route Tile 9",  region: route}
  - {id: route.safe.10, name: "Safe Route Tile 10", region: route}

edges:
  # ── Risky route (city → risky.1 → … → risky.4 → farm, 총 5 hops) ────────────
  - {u: city,           v: route.risky.1, travel_cost: 1, base_threat: 0.25, capacity: 4}
  - {u: route.risky.1,  v: route.risky.2, travel_cost: 1, base_threat: 0.55, capacity: 4}
  - {u: route.risky.2,  v: route.risky.3, travel_cost: 1, base_threat: 0.70, capacity: 4}
  - {u: route.risky.3,  v: route.risky.4, travel_cost: 1, base_threat: 0.45, capacity: 4}
  - {u: route.risky.4,  v: farm,          travel_cost: 1, base_threat: 0.25, capacity: 4}

  # ── Safe route (city → safe.1 → … → safe.10 → farm, 총 11 hops) ─────────────
  - {u: city,           v: route.safe.1,  travel_cost: 1, base_threat: 0.02, capacity: 4}
  - {u: route.safe.1,   v: route.safe.2,  travel_cost: 1, base_threat: 0.02, capacity: 4}
  - {u: route.safe.2,   v: route.safe.3,  travel_cost: 1, base_threat: 0.02, capacity: 4}
  - {u: route.safe.3,   v: route.safe.4,  travel_cost: 1, base_threat: 0.03, capacity: 4}
  - {u: route.safe.4,   v: route.safe.5,  travel_cost: 1, base_threat: 0.03, capacity: 4}
  - {u: route.safe.5,   v: route.safe.6,  travel_cost: 1, base_threat: 0.03, capacity: 4}
  - {u: route.safe.6,   v: route.safe.7,  travel_cost: 1, base_threat: 0.03, capacity: 4}
  - {u: route.safe.7,   v: route.safe.8,  travel_cost: 1, base_threat: 0.03, capacity: 4}
  - {u: route.safe.8,   v: route.safe.9,  travel_cost: 1, base_threat: 0.02, capacity: 4}
  - {u: route.safe.9,   v: route.safe.10, travel_cost: 1, base_threat: 0.02, capacity: 4}
  - {u: route.safe.10,  v: farm,          travel_cost: 1, base_threat: 0.02, capacity: 4}

  # ── Hideout adjacency (risky.3 ↔ hideout) ───────────────────────────────────
  - {u: route.risky.3, v: raider.hideout, travel_cost: 1, base_threat: 0.0, capacity: 1}

agents:
