  - {id: farmer_2, name: "Farmer Ben",   role: farmer, home_node: farm, gold: 20}
  - {id: farmer_3, name: "Farmer Cam",   role: farmer, home_node: farm, gold: 20, inventory: {wheat: 1}}
  - {id: farmer_4, name: "Farmer Dana",  role: farmer, home_node: farm, gold: 20}
